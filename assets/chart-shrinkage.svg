<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <title>Designed vs. printed dot geometry on budget FDM printers</title>
  <rect width="720" height="420" fill="#fafaf7"/>
  <text x="360" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#0a0a0c">Designed vs. printed dot geometry</text>
  <text x="360" y="66" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8a8a86">Budget FDM, 0.2mm layers — why every dimension is over-built by ~20&#8211;30%</text>

  <line x1="90" y1="340" x2="650" y2="340" stroke="#0a0a0c" stroke-opacity="0.25"/>

  <!-- group 1: dot diameter (mm) scale 0-2mm mapped to 0-200px -->
  <g transform="translate(160,0)">
    <rect x="-40" y="220" width="46" height="120" fill="#0a0a0c"/>
    <text x="-17" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#0a0a0c">1.6</text>
    <rect x="16" y="242" width="46" height="98" fill="#0a0a0c" opacity="0.4"/>
    <text x="39" y="234" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#0a0a0c">1.3</text>
    <text x="0" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0a0a0c">Dot diameter (mm)</text>
    <text x="0" y="386" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8a8a86">&#8722;19%</text>
  </g>

  <!-- group 2: dot height (mm) scale 0-1mm mapped -->
  <g transform="translate(420,0)">
    <rect x="-40" y="238" width="46" height="102" fill="#0a0a0c"/>
    <text x="-17" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#0a0a0c">0.85</text>
    <rect x="16" y="268" width="46" height="72" fill="#0a0a0c" opacity="0.4"/>
    <text x="39" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#0a0a0c">0.60</text>
    <text x="0" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0a0a0c">Dot height (mm)</text>
    <text x="0" y="386" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8a8a86">&#8722;29%</text>
  </g>

  <!-- legend -->
  <g transform="translate(560,150)" font-family="Arial, sans-serif" font-size="12" fill="#0a0a0c">
    <rect x="0" y="0" width="14" height="14" fill="#0a0a0c"/>
    <text x="20" y="11">Designed</text>
    <rect x="0" y="24" width="14" height="14" fill="#0a0a0c" opacity="0.4"/>
    <text x="20" y="35">Printed</text>
  </g>

  <text x="360" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8a8a86">Both printed values land inside the ISO 17049:2013 tolerance band and the 0.6&#8211;0.9mm optimal tactile range.</text>
</svg>
