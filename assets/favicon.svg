  <g fill="#fafaf7">
    <circle cx="23" cy="19" r="6.2"/>
    <circle cx="23" cy="32" r="6.2"/>
    <circle cx="41" cy="32" r="6.2"/>
    <circle cx="41" cy="45" r="6.2"/>
  </g>
  <g fill="#fafaf7" opacity="0.2">
    <circle cx="23" cy="45" r="6.2"/>
    <circle cx="41" cy="19" r="6.2"/>
  </g>
</svg>
