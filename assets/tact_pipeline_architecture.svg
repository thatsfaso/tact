<svg width="100%" viewBox="0 0 680 664" role="img" xmlns="http://www.w3.org/2000/svg">
<title>TACT pipeline architecture</title>
<desc>Flowchart showing the full browser-based pipeline: voice or text input, speech-to-text, the WebLLM story generator, parallel Braille translation and tactile graphics selection, page layout, STL generation, and 3D printer output. The whole pipeline runs client-side in a single index.html file.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<g>
<rect x="230" y="40" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Voice or text input</text>
</g>
<line x1="340" y1="84" x2="340" y2="116" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="210" y="116" width="260" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Speech-to-text</text>
<text x="340" y="156" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">Web Speech API (browser)</text>
</g>
<line x1="340" y1="172" x2="340" y2="204" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="170" y="204" width="340" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="224" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">LLM story generator</text>
<text x="340" y="244" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">WebLLM adaptive, capped at 3B (D016–D017)</text>
</g>
<path d="M340 260 L175 300" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 260 L505 300" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="50" y="300" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="175" y="320" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Braille translation</text>
<text x="175" y="340" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">Pure-JS Grade 1 (D018)</text>
</g>

<g>
<rect x="380" y="300" width="250" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="505" y="320" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">Tactile graphics</text>
<text x="505" y="340" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Keyword picker · ~89 shapes (D021)</text>
</g>

<path d="M175 356 L340 400" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M505 356 L340 400" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="170" y="400" width="340" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="420" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Page layout engine</text>
<text x="340" y="440" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Square corner layout (D019) · balanced pagination (D020)</text>
</g>
<line x1="340" y1="456" x2="340" y2="488" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="190" y="488" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="508" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">STL generator</text>
<text x="340" y="528" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Browser JS · binary STL</text>
</g>
<line x1="340" y1="544" x2="340" y2="576" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="230" y="576" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="598" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">3D printer output</text>
</g>

<text x="340" y="644" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#82817A" opacity="0.7">One self-contained index.html — no backend, no build step (D008, D014)</text>
</svg>
