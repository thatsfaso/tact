# Tact Braille page — PrusaSlicer / SuperSlicer print profile
# Layer height is the setting that matters: Braille dots are sub-millimetre
# domes, and at 0.2 mm they come out stepped instead of round.
[print:Tact Braille page]
layer_height = 0.12
first_layer_height = 0.2
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 15%
fill_pattern = gyroid
support_material = 0
brim_width = 5
brim_type = outer_only
perimeter_speed = 40
small_perimeter_speed = 25
external_perimeter_speed = 30
infill_speed = 60
top_solid_infill_speed = 30
travel_speed = 150
first_layer_speed = 20
elefant_foot_compensation = 0.2
compatible_printers_condition = nozzle_diameter[0]>0.3 and nozzle_diameter[0]<0.5
