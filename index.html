function App() {
  const [lang,  setLang]  = useState("en");
  const [sound, setSound] = useState(window.SFX ? window.SFX.isEnabled() : true);
  const [phase, setPhase] = useState("idle");
  const [text,  setText]  = useState("");
  const [pages, setPages] = useState(null);
  const [helpOpen,        setHelpOpen]        = useState(false);
  const [loadingMsg,      setLoadingMsg]      = useState("");
  const [loadingProgress, setLoadingProgress] = useState(null);
  const t = COPY[lang];

  const inputRef  = useRef(null);
  const loaderRef = useRef(null);
  const srRef     = useRef(null);

  const stopLoader = () => {
    if (loaderRef.current) { loaderRef.current.stop(); loaderRef.current = null; }
  };

  const toggleListen = () => {
    if (phase === "listening") {
      if (srRef.current) { srRef.current.stop(); srRef.current = null; }
      window.SFX && window.SFX.play("listenEnd");
      setPhase("idle");
      return;
    }
    window.SFX && window.SFX.play("listenStart");
    setPhase("listening");

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      // No Web Speech API — simulate after 3s
      setTimeout(() => {
        const phrase = lang === "it" ? "un gatto pirata che naviga verso la luna" : "a pirate cat who sails to the moon";
        setText(phrase);
        window.SFX && window.SFX.play("listenEnd");
        doSubmit(phrase);
      }, 3000);
      return;
    }

    const sr = new SR();
    srRef.current = sr;
    sr.lang = lang === "it" ? "it-IT" : "en-US";
    sr.continuous = false;
    sr.interimResults = false;
    sr.onresult = (e) => {
      const phrase = e.results[0][0].transcript;
      setText(phrase);
      srRef.current = null;
      window.SFX && window.SFX.play("listenEnd");
      doSubmit(phrase);
    };
    sr.onerror = () => { srRef.current = null; setPhase("idle"); window.SFX && window.SFX.play("listenEnd"); };
    sr.onend   = () => { srRef.current = null; };
    try {
      sr.start();
    } catch (err) {
      // start() can throw synchronously (mic blocked, InvalidStateError, etc.)
      // — recover instead of stranding the UI on the listening screen.
      console.warn("[TACT] speech recognition could not start:", err && err.message);
      srRef.current = null;
      setPhase("idle");
      window.SFX && window.SFX.play("listenEnd");
    }
  };

  const doSubmit = async (q) => {
    setPhase("loading");
    setLoadingMsg(t.weaving);
    setLoadingProgress(null);
    loaderRef.current = window.SFX && window.SFX.startLoader ? window.SFX.startLoader() : null;

    try {
      let rawPages;
      let isDemo = false;

      // Try the AI paths in order: the cloud proxy (instant, any device), then
      // the in-browser model (private, needs WebGPU and a download). If neither
      // is available the visitor's own words still become a real Braille page,
      // so there is never a dead end.
      let storyText = null;
      setLoadingMsg(t.generating);
      try {
        storyText = await window.TACT.generateStory(q, lang, (pct, statusText, modelLabel, fromCache) => {
          if (pct < 1) {
            setLoadingMsg((fromCache ? t.modelCached : t.modelDownloading) + (modelLabel ? " · " + modelLabel : ""));
            setLoadingProgress(pct);
          } else {
            setLoadingMsg(t.generating);
            setLoadingProgress(null);
          }
        });
      } catch (llmErr) {
        console.warn('[TACT] no AI path available, using the prompt text directly:', llmErr.message);
        isDemo = true; // mark that the AI writing step didn't run
      }

      // The model cannot count words accurately enough to land inside the narrow
      // window that fills exactly two cards. So measure what came back, and if it
      // does not sit well on the pages, ask once more for the length this very
      // story's density says is right. Keep whichever of the two prints better.
      if (storyText) {
        const firstFit = measureFit(storyText);
        if (!fitIsGood(firstFit)) {
          try {
            const retry = await window.TACT.generateStory(q, lang, null, idealWordCount(storyText));
            const retryFit = measureFit(retry);
            const better = (retryFit.pages === 2 && firstFit.pages !== 2) ||
                           (retryFit.pages === firstFit.pages && retryFit.minFill > firstFit.minFill) ||
                           (retryFit.pages === 2 && firstFit.pages === 2 && retryFit.minFill > firstFit.minFill);
            if (better) storyText = retry;
          } catch (e) {
            /* keep the first story: a slightly loose page beats no story */
          }
        }
      }

      rawPages = buildPages(storyText || q, lang);

      setLoadingMsg(t.brailleTranslating);
      setLoadingProgress(null);

      const storyPages = await Promise.all(rawPages.map(async (p) => {
        let brailleCells = null;
        try { brailleCells = await window.TACT.translateBraille(p.text, lang); }
        catch (e) { /* JS fallback used in StoryResult */ }
        return { text: p.text, illustration: p.illustration, full: p.full, brailleCells, demo: isDemo };
      }));

      stopLoader();
      window.SFX && window.SFX.play("ready");
      setPages(storyPages);
      setPhase("result");

    } catch (err) {
      console.error('[TACT] submit failed:', err);
      stopLoader();
      const fallback = DEMO_PAGES[lang].map(p => ({ ...p, brailleCells: null, demo: true }));
      window.SFX && window.SFX.play("ready");
      setPages(fallback);
      setPhase("result");
    }
  };

  const submit = (q) => { if (q && q.trim()) doSubmit(q.trim()); };

  const reset = () => {
    stopLoader();
    if (srRef.current) { srRef.current.stop(); srRef.current = null; }
    window.SFX && window.SFX.play("tap");
    setPages(null); setText(""); setPhase("idle");
    setLoadingMsg(""); setLoadingProgress(null);
  };

  return (
    <div className="relative w-full h-full">
      <Header lang={lang} setLang={setLang} sound={sound} setSound={setSound} t={t} onHelp={() => { window.SFX && window.SFX.play("tap"); setHelpOpen(true); }} />
      {helpOpen && <HelpPanel t={t} onClose={() => setHelpOpen(false)} />}

      {(phase === "idle" || phase === "listening") && (
        <main className="absolute inset-0 flex flex-col items-center justify-center px-6">
          <div className="flex flex-col items-center gap-7 max-w-[680px] w-full text-center">

            {!window.TACT.cloudEnabled && !window.TACT.webgpuSupported && (
              <div className="mono text-[10px] uppercase tracking-[0.18em] px-3 py-1.5 rounded-full"
                style={{ background: 'rgba(10,10,12,0.06)', color: 'var(--muted)' }}>
                {t.demoNotice}
              </div>
            )}

            <div className="mono text-[11px] tracking-[0.24em] uppercase rise" style={{ color: "var(--muted)" }}>
              {t.eyebrow}
            </div>
            <h1 className="serif rise" style={{ fontSize: "clamp(44px, 6vw, 76px)", lineHeight: 1.05, letterSpacing: "-0.02em", maxWidth: 720, whiteSpace: "nowrap" }}>
              {t.headline}
            </h1>
            <p className="rise-slow text-[16px] leading-[1.55] max-w-[520px]" style={{ color: "var(--muted)" }}>
              {t.sub}
            </p>

            <div className="flex flex-col items-center gap-4 rise-slow mt-2">
              <MicButton state={phase === "listening" ? "listening" : "idle"} onClick={toggleListen} t={t} />
              <div aria-hidden="true" className="mono text-[11px] tracking-[0.22em] uppercase" style={{ color: phase === "listening" ? "var(--ink)" : "var(--muted)" }}>
                {phase === "listening" ? t.listening : t.tap}
              </div>
            </div>

            <div className="flex flex-col items-center gap-4 w-full rise-slow">
              <div className="mono text-[10px] tracking-[0.24em] uppercase" style={{ color: "var(--muted-soft)" }}>— {t.or} —</div>
              <form className="w-full max-w-[520px] flex items-center gap-2 px-2 py-2 rounded-full"
                style={{ background: "rgba(250,250,247,0.7)", boxShadow: "0 0 0 1px var(--hairline) inset", backdropFilter: "blur(10px)" }}
                onSubmit={(e) => { e.preventDefault(); if (text.trim()) submit(text.trim()); }}>
                <input ref={inputRef} type="text" value={text} onChange={(e) => setText(e.target.value)}
                  aria-label={t.inputLabel}
                  placeholder={t.placeholder} className="flex-1 bg-transparent outline-none px-4 py-2 text-[15px]"
                  style={{ color: "var(--ink)" }} />
                <button type="submit" disabled={!text.trim()} className="btn"
                  style={{ padding: "10px 18px", opacity: text.trim() ? 1 : 0.4, cursor: text.trim() ? "pointer" : "default" }}>
                  {t.submit}
                </button>
              </form>
            </div>

            <div className="w-full mt-2">
              <HintMarquee hints={t.hints} useIdeaLabel={t.useIdea} onPick={(h) => { setText(h); inputRef.current && inputRef.current.focus(); }} />
            </div>
          </div>

          <div className="mono text-[10px] tracking-[0.22em] uppercase absolute bottom-6 left-1/2 -translate-x-1/2" style={{ color: "var(--muted-soft)" }}>
            {t.footer}
          </div>
        </main>
      )}

      {phase === "loading" && <LoadingScreen msg={loadingMsg} progress={loadingProgress} t={t} />}
      {phase === "result" && pages && <StoryResult pages={pages} lang={lang} t={t} onAgain={reset} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
